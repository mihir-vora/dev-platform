services:
  api:
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://devplatform:devplatform@postgres:5432/devplatform?sslmode=disable}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET is required}
      COOKIE_SECURE: "true"
      FRONTEND_URL: ${FRONTEND_URL:-https://app-dev.vibsl.com}
      OAUTH_CALLBACK_BASE_URL: ${OAUTH_CALLBACK_BASE_URL:-https://app-dev.vibsl.com}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GITLAB_CLIENT_ID: ${GITLAB_CLIENT_ID:-}
      GITLAB_CLIENT_SECRET: ${GITLAB_CLIENT_SECRET:-}

  worker:
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://devplatform:devplatform@postgres:5432/devplatform?sslmode=disable}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET is required}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-3}
      WORKER_POLL_INTERVAL: ${WORKER_POLL_INTERVAL:-1s}

  frontend:
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://app-dev.vibsl.com}

  nginx:
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
