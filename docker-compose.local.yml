services:
  postgres:
    profiles: [local]
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: devplatform
      POSTGRES_PASSWORD: devplatform
      POSTGRES_DB: devplatform
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devplatform -d devplatform"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    profiles: [local]
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  migrate:
    image: migrate/migrate:v4.17.1
    depends_on:
      postgres:
        condition: service_healthy
        required: false
    volumes:
      - ./backend/migrations:/migrations
    command:
      [
        "-path",
        "/migrations",
        "-database",
        "postgres://devplatform:devplatform@postgres:5432/devplatform?sslmode=disable",
        "up",
      ]

  api:
    build:
      context: ./backend
    command: api
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      PORT: 8080
      DATABASE_URL: postgres://devplatform:devplatform@postgres:5432/devplatform?sslmode=disable
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      SESSION_SECRET: local-dev-session-secret-change-me-32chars
      FRONTEND_URL: http://localhost:8088
      OAUTH_CALLBACK_BASE_URL: http://localhost:8088
      COOKIE_SECURE: "false"
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GITLAB_CLIENT_ID: ${GITLAB_CLIENT_ID:-}
      GITLAB_CLIENT_SECRET: ${GITLAB_CLIENT_SECRET:-}
      GITLAB_BASE_URL: ${GITLAB_BASE_URL:-https://gitlab.com}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    ports:
      - "8080:8080"

  worker:
    build:
      context: ./backend
    command: worker
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgres://devplatform:devplatform@postgres:5432/devplatform?sslmode=disable
      REDIS_URL: ${REDIS_URL:-}
      SESSION_SECRET: local-dev-session-secret-change-me-32chars
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-3}
      WORKER_POLL_INTERVAL: ${WORKER_POLL_INTERVAL:-1s}

  frontend:
    build:
      context: ./frontend
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8088
      API_INTERNAL_URL: http://api:8080
    ports:
      - "3000:3000"

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      frontend:
        condition: service_started
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pidof nginx || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    ports:
      - "8088:80"
    volumes:
      - ./deploy/nginx.local.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_data:
